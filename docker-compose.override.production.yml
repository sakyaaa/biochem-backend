version: "3.9"

services:
  db:
    environment:
      POSTGRES_DB: biochem_production
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgresql://biochem:${DATABASE_PASSWORD}@db:5432/biochem_production
      RAILS_LOG_TO_STDOUT: "true"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  frontend:
    environment:
      PUBLIC_API_URL: https://${DOMAIN}/api
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro

version: "3.9"

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: biochem
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-password}
      POSTGRES_DB: biochem_development
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biochem"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://biochem:${DATABASE_PASSWORD:-password}@db:5432/biochem_development
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DEVISE_JWT_SECRET_KEY: ${DEVISE_JWT_SECRET_KEY:-changeme}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4321}
      RAILS_ENV: development
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../biochem-frontend
      dockerfile: Dockerfile
    environment:
      PUBLIC_API_URL: http://localhost/api
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:

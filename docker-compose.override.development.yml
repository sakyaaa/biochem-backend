version: "3.9"

services:
  backend:
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    command: >
      bash -c "bundle exec rails db:prepare && bundle exec puma -C config/puma.rb"
    stdin_open: true
    tty: true

  frontend:
    volumes:
      - ../biochem-frontend:/app
      - node_modules_cache:/app/node_modules
    command: npm run dev -- --host 0.0.0.0

  nginx:
    ports:
      - "80:80"

volumes:
  bundle_cache:
  node_modules_cache:
